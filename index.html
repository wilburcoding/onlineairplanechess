<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/public/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/3f34c302de.js"
      crossorigin="anonymous"
    ></script>
    <title>Online Airplane Chess</title>
  </head>

  <body>
    <div id="app">
      <div id="pixi-container"></div>
      <div id="pixi-overlay" style="pointer-events: none">
        <div id="sidebar-left" style="left: 0" class="sidebar"></div>
        <div id="sidebar-right" style="right: 0" class="sidebar"></div>
        <div id="waiting-room">
          <h1>Waiting for Players...</h1>
          <p style="margin-top: 0px; margin-bottom: 10px">
            Invite friends to join your game using the join code below.
          </p>
          <div id="join-code-card">
            <p id="join-code-value">
              Join Code: <span id="join-code"></span>
              <i class="fa-regular fa-copy" id="copy-code"></i>
            </p>
          </div>

          <div id="players-list">
            <div class="player-card user-ready" id="w-p1-card">
              <div class="user-icon-container">
                <div class="user-status" id="w-p1-status">
                  <i class="fa-solid fa-check"></i>
                </div>
                <i class="fa-regular fa-user user-icon"> </i>
              </div>

              <p id="w-p1-name">Player 1</p>
            </div>
            <div class="player-card user-waiting" id="w-p2-card">
              <div class="user-icon-container">
                <div class="user-status" id="w-p2-status">
                  <i class="fa-solid fa-check"></i>
                </div>
                <i class="fa-regular fa-user user-icon"> </i>
              </div>

              <p id="w-p2-name">Player 2</p>
            </div>
            <div class="player-card user-ready" id="w-p3-card">
              <div class="user-icon-container user-ready" >
                <div class="user-status" id="w-p3-status">
                  <i class="fa-solid fa-check"></i>
                </div>
                <i class="fa-regular fa-user user-icon"> </i>
              </div>

              <p id="w-p3-name">Player 3</p>
            </div>
            <div class="player-card user-waiting" id="w-p4-card">
              <div class="user-icon-container ">
                <div class="user-status" id="w-p4-status">
                  <i class="fa-regular fa-clock"></i>
                </div>
                <i class="fa-regular fa-user user-icon"> </i>
              </div>

              <p id="w-p4-name">Player 4</p>
            </div>
          </div>
          <div id="host-actions-container"> 
            <button id="cancel-game">Cancel Game</button>
            <button id="start-game" disabled>Start Game</button>
          </div>

          <div id="non-host-actions-container">
            <button id="leave">Leave Game</button>
          </div>
        </div>
      </div>
      <div id="jcontainer">
        <div id="join-container">
          <i
            class="fa-solid fa-xmark"
            style="position: absolute; top: 10px; left: 10px; font-size: 25px"
            id="join-close"
          ></i>
          <h1>Join a Game</h1>
          <p style="margin-top: 0px; margin-bottom: 15px">
            Enter the 6-digit join code from the host
          </p>
          <input
            type="text"
            inputmode="numeric"
            id="joincode"
            placeholder="Join Code"
            style="margin-bottom: 5px"
          />
          <button id="join-button">Join Game</button>
          <p id="message"></p>
        </div>
      </div>
      <div id="ui-layer">
        <div id="ui-container">
          <h1 style="margin-bottom:0px;">Online Airplane Chess</h1>
          <p style="width:300px;text-align:center;">Play Airplane Chess multiplayer online! Choose your username to get started!</p>
          <input type="text" id="username" style="width:80%;margin-top:5px;margin-bottom:10px;" placeholder="Enter your username" />
          <button id="start">Start a Game</button>
          <button id="join">Join a Game</button>
        </div>
      </div>
    </div>
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
